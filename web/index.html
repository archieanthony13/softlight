<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softlight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="top-section" id="top-panel">
            <button id="patch-menu-button">Patch</button>
        </div>
        <div class="middle-section">
            <div class="middle-left-section" id="fixtures"></div>
            <div class="middle-right-section" id="sequences">
                <p>Mid Right</p>
            </div>
        </div>
        <div class="bottom-section">
            <div class="bottom-left-section">
                <button id="attribute-page-up">Page Up</button>
                <button id="attribute-page-down">Page Down</button>
            </div>
            <div class="bottom-right-section">
                <div class="bottom-right-top-section" id="attributes">
                    <button>Dimmer</button>
                    <button>Color</button>
                    <button>Position</button>
                    <button>Beam</button>
                    <button>Shape</button>
                </div>
                <div class="bottom-right-bottom-section" id="attribute-values">
                    <label for="attribute-values-input-1" id="attribute-values-input-1-label"></label>
                    <label for="attribute-values-input-2" id="attribute-values-input-2-label"></label>
                    <label for="attribute-values-input-3" id="attribute-values-input-3-label"></label>
                    <label for="attribute-values-input-4" id="attribute-values-input-4-label"></label>
                    <label for="attribute-values-input-5" id="attribute-values-input-5-label"></label>
                    <input type="number" name="attribute-values-input-1" id="attribute-values-input-1" min="0" max="255" value="0">
                    <input type="number" name="attribute-values-input-2" id="attribute-values-input-2" min="0" max="255" value="0">
                    <input type="number" name="attribute-values-input-3" id="attribute-values-input-3" min="0" max="255" value="0">
                    <input type="number" name="attribute-values-input-4" id="attribute-values-input-4" min="0" max="255" value="0">
                    <input type="number" name="attribute-values-input-5" id="attribute-values-input-5" min="0" max="255" value="0">
                </div>
            </div>
        </div>
    </div>
    <div class="patch-menu">
        <div class="patch-menu-top-section">
            <button id="upload-fixture-profile">Upload Fixture Profile</button>
            <button id="patch-fixture">Patch Fixture</button>
            <button id="delete-fixture">Delete Fixture</button>
            <button id="edit-fixture">Edit Fixture</button>
        </div>
        <div class="patch-menu-bottom-section">

        </div>
    </div>

    <script src="classes/artnet.js"></script>
    <script src="classes/cue.js"></script>
    <script src="classes/cuemanager.js"></script>
    <script src="classes/dmx.js"></script>
    <script src="classes/fader.js"></script>
    <script src="classes/fixture.js"></script>
    <script src="classes/fixturemanager.js"></script>
    <script src="classes/patch.js"></script>
    <script src="classes/ui.js"></script>
    <script src="setup.js"></script>
    <script src="main.js"></script>
</body>
</html>
