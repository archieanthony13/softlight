<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softlight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/textures/logo.svg" type="image/svg">
</head>
<body>
    <div class="container">
        <div class="top-section" id="top-panel">
            <button id="settings-menu-button">Settings</button>
            <button id="patch-menu-button">Patch</button>
            <br>
            <button id="cues-section-button" class="section-button selected">Cues</button>
            <button id="sequences-section-button" class="section-button">Sequences</button>
            <button id="palettes-section-button" class="section-button">Palettes</button>
        </div>
        <div class="middle-section">
            <div class="middle-left-section">
                <div class="middle-left-top-section">
                    <button id="fixtures-clear-button">Clear</button>
                </div>
                <div class="middle-left-bottom-section" id="fixtures-list"></div>
            </div>
            <div class="middle-right-section" id="cues">
                <div class="middle-right-top-section">
                    <button id="cues-go-button">Go</button>
                    <button id="cues-store-button">Store</button>
                    <button id="cues-delete-button">Delete</button>
                </div>
                <div class="middle-right-bottom-section" id="cues-cuelist">

                </div>
            </div>
            <div class="middle-right-section" id="sequences">
                <div class="middle-right-top-section">
                    <button id="sequences-create-button">Create Sequence</button>
                    <button id="sequences-delete-button">Delete Sequence</button>
                </div>
                <div class="middle-right-bottom-section" id="sequences-sequencelist">

                </div>
            </div>
            <div class="middle-right-section" id="palettes">
                <div class="middle-right-top-section">
                    <button id="palettes-create-button">Create Palette</button>
                    <button id="palettes-delete-button">Delete Palette</button>
                </div>
                <div class="middle-right-bottom-section" id="palettes-palettelist">

                </div>
            </div>
        </div>
        <div class="bottom-section">
            <div class="bottom-left-section">
                <button id="attribute-page-up">Page Up</button>
                <button id="attribute-page-down">Page Down</button>
            </div>
            <div class="bottom-right-section">
                <div class="bottom-right-top-section" id="attributes">
                    <button class="section-button selected">Dimmer</button>
                    <button class="section-button">Color</button>
                    <button class="section-button">Position</button>
                    <button class="section-button">Beam</button>
                    <button class="section-button">Shape</button>
                </div>
                <div class="bottom-right-bottom-section" id="attribute-values">
                    <button data-bits="1" data-pixels="1"></button>
                    <button data-bits="1" data-pixels="1"></button>
                    <button data-bits="1" data-pixels="1"></button>
                    <button data-bits="1" data-pixels="1"></button>
                    <button data-bits="1" data-pixels="1"></button>
                </div>
            </div>
        </div>
    </div>

    <div class="menu" id="settings-menu">
        <div class="menu-top-section">
            <button id="save-page" class="section-button">Save</button>
            <button id="network-page" class="section-button">Network</button>
            <button id="exit-settings" class="exit-button"><img src="assets/textures/cross.svg" class="button-image"></button>
        </div>
        <div class="menu-bottom-section save-page">
            <div class="menu-bottom-top-section save-page">
                <button id="save-to-file">Save to File</button>
                <button id="save-to-browser">Save to Browser</button>
                <button id="load-from-file">Load from File</button>
                <button id="load-from-browser">Load from Browser</button>
            </div>
            <div class="menu-bottom-bottom-section save-page">
                
            </div>
        </div>
        <div class="menu-bottom-section network-page">
            <div class="menu-bottom-top-section network-page">
                <button id="network-save-preferences">Save Preferences</button>
                <button id="network-reset">Reset to Default</button>
            </div>
            <div class="menu-bottom-bottom-section network-page">
                <label for="settings-network-ip-address">Art-Net IP Address</label>
                <input type="text" name="settings-network-ip-address" id="settings-network-ip-address">
                <label for="settings-network-websocket-address">Websocket Address</label>
                <input type="text" name="settings-network-websocket-address" id="settings-network-websocket-address">
            </div>
        </div>
    </div>

    <div class="menu" id="patch-menu">
        <div class="menu-top-section">
            <button id="fixture-list" class="section-button">Fixture List</button>
            <button id="patch-fixture" class="section-button">Patch Fixture</button>
            <button id="exit-patch" class="exit-button"><img src="assets/textures/cross.svg" class="button-image"></button>
        </div>
        <div class="menu-bottom-section fixture-list">
            <div class="menu-bottom-top-section fixture-list">
                <button id="delete-fixture">Delete Fixture</button>
            </div>
            <div class="menu-bottom-bottom-section fixture-list">

            </div>
        </div>
        <div class="menu-bottom-section patch-fixture">
            <div class="menu-bottom-top-section patch-fixture">
                <button id="upload-fixture-profile">Upload Fixture Profile</button>
                <button id="load-fixture-library">Load Fixture Library</button>
                <button id="clear-fixture-library">Clear Fixture Library</button>
            </div>
            <div class="menu-bottom-bottom-section patch-fixture">
                <label for="patch-fixture-manufacturer">Manufacturer:</label>
                <select name="manufacturer" id="patch-fixture-manufacturer"></select>
                <label for="patch-fixture-name">Fixture:</label>
                <select name="name" id="patch-fixture-name"></select>
                <label for="patch-fixture-channel">Mode:</label>
                <select name="channel" id="patch-fixture-channel"></select>
                <label for="patch-fixture-fixture-name">Name:</label>
                <input type="text" id="patch-fixture-fixture-name" placeholder="Fixture Name">
                <label for="patch-fixture-fixture-channel">Channel:</label>
                <input type="number" id="patch-fixture-fixture-channel" placeholder="Channel">
                <br>
                <button id="patch-fixture-patch">Patch</button>
            </div>
        </div>
    </div>

    <div class="menu" id="parameter-menu">
        <div class="menu-top-section">
            <button id="raw-value" class="section-button">Raw Value</button>
            <button id="list-values" class="section-button">List Values</button>
            <button id="pixel-values" class="section-button">Pixel Values</button>
            <button id="exit-parameter" class="exit-button"><img src="assets/textures/cross.svg" class="button-image"></button>
        </div>
        <div class="menu-bottom-section raw-value">
            <div class="menu-bottom-top-section raw-value">
                <button id="raw-value-min">Min</button>
                <button id="raw-value-half">Half</button>
                <button id="raw-value-max">Max</button>
            </div>
            <div class="menu-bottom-bottom-section raw-value">
                <input type="number" name="parameter-raw-value" id="parameter-raw-value" min="0" max="255">
                <p id="parameter-range">Min: 0, Max: 255</p>
            </div>
        </div>
        <div class="menu-bottom-section list-values">

        </div>
        <div class="menu-bottom-section pixel-values">
            <input type="number" name="pixel-values-pixel" id="pixel-values-pixel">
            <input type="number" name="pixel-values-value" id="pixel-values-value">
        </div>
    </div>

    <div class="menu" id="cue-menu">
        <div class="menu-top-section">
            <button id="cue-settings" class="section-button">Cue Settings</button>
            <button id="cue-timings" class="section-button">Timings</button>
            <button id="exit-cue" class="exit-button"><img src="assets/textures/cross.svg" class="button-image"></button>
        </div>
        <div class="menu-bottom-section cue-settings">
            <label for="cue-settings-cue-number">Cue Number:</label>
            <input type="number" name="cue-settings-cue-number" id="cue-settings-cue-number" step="any" min="0">
            <label for="cue-settings-cue-name">Cue Name:</label>
            <input type="text" name="cue-settings-cue-name" id="cue-settings-cue-name">
            <label for="cue-settings-store-mode">Store Mode:</label>
            <select name="cue-settings-store-mode" id="cue-settings-store-mode">
                <option value="merge">Merge</option>
                <option value="overwrite">Overwrite</option>
            </select>
        </div>
        <div class="menu-bottom-section cue-timings">
            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>D Up</th>
                        <th>D Down</th>
                        <th>C</th>
                        <th>P</th>
                        <th>B</th>
                        <th>S</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th>Fade:</th>
                        <td>
                            <input type="number" name="cue-timings-fade-dimmer-up" id="cue-timings-fade-dimmer-up" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-fade-dimmer-down" id="cue-timings-fade-dimmer-down" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-fade-color" id="cue-timings-fade-color" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-fade-position" id="cue-timings-fade-position" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-fade-beam" id="cue-timings-fade-beam" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-fade-shape" id="cue-timings-fade-shape" step="any" min="0">
                        </td>
                    </tr>
                    <tr>
                        <th>Delay:</th>
                        <td>
                            <input type="number" name="cue-timings-delay-dimmer-up" id="cue-timings-delay-dimmer-up" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-delay-dimmer-down" id="cue-timings-delay-dimmer-down" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-delay-color" id="cue-timings-delay-color" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-delay-position" id="cue-timings-delay-position" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-delay-beam" id="cue-timings-delay-beam" step="any" min="0">
                        </td>
                        <td>
                            <input type="number" name="cue-timings-delay-shape" id="cue-timings-delay-shape" step="any" min="0">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="classes/artnet.js"></script>
    <script src="classes/cue.js"></script>
    <script src="classes/dmx.js"></script>
    <script src="classes/fader.js"></script>
    <script src="classes/fixture.js"></script>
    <script src="classes/fixturemanager.js"></script>
    <script src="classes/parameter.js"></script>
    <script src="classes/patch.js"></script>
    <script src="classes/save.js"></script>
    <script src="classes/sequence.js"></script>
    <script src="classes/sequencemanager.js"></script>
    <script src="classes/settings.js"></script>
    <script src="classes/ui.js"></script>
    <script src="setup.js"></script>
    <script src="main.js"></script>
</body>
</html>
