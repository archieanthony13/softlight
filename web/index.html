<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softlight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="top-section" id="top-panel">
            <p>TOP</p>
        </div>
        <div class="middle-section">
            <div class="middle-left-section" id="fixtures">
                <p>Mid Left</p>
            </div>
            <div class="middle-right-section" id="sequences">
                <p>Mid Right</p>
            </div>
        </div>
        <div class="bottom-section">
            <div class="bottom-left-section">
                <p>Bottom Left</p>
            </div>
            <div class="bottom-right-section">
                <div class="bottom-right-top-section" id="attributes">
                    <button>Dimmer</button>
                    <button>Color</button>
                    <button>Position</button>
                    <button>Beam</button>
                    <button>Shape</button>
                </div>
                <div class="bottom-right-bottom-section" id="attribute-values">
                    <label for="attribute-values-input-1">Value</label>
                    <label for="attribute-values-input-2">Value</label>
                    <label for="attribute-values-input-3">Value</label>
                    <label for="attribute-values-input-4">Value</label>
                    <label for="attribute-values-input-5">Value</label>
                    <input type="text" name="attribute-values-input-1" id="attribute-values-input-1">
                    <input type="text" name="attribute-values-input-2" id="attribute-values-input-2">
                    <input type="text" name="attribute-values-input-3" id="attribute-values-input-3">
                    <input type="text" name="attribute-values-input-4" id="attribute-values-input-4">
                    <input type="text" name="attribute-values-input-5" id="attribute-values-input-5">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
